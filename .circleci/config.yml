version: 2.1

orbs:
  aws-cli: circleci/aws-cli@4.1.3
  aws-ecr: circleci/aws-ecr@9.0.4
  docker: circleci/docker@2.2.0
  jq: circleci/jq@3.0.0

commands:
  verify-version-in-docker-image:
    parameters:
      image:
        description: Image name to validate
        type: string
      version:
        description: Expected contents for /app/apollo/agent/version file
        type: string
    steps:
    - run:
        name: Verify version in Docker image
        command: |
          image_version=$(docker run --rm --entrypoint python << parameters.image >> apollo/agent/settings.py)
          if [ $image_version = "<< parameters.version >>" ]
            then exit 0
            else echo "Failed to find expected version, found: $image_version"; exit 1
          fi
  generate-version-number-dev:
    steps:
    - run:
        command: |
          PIPELINE_NUMBER=<< pipeline.number >>
          if git describe --tags --abbrev=0; then TAG=$(git describe --tags --abbrev=0); else exit 1; fi
          VERSION=${TAG#v}
          echo "NEXT_VERSION=$(echo "$VERSION" | awk 'BEGIN{FS=OFS="."} {$3+=1} 1')rc${PIPELINE_NUMBER}" >> $BASH_ENV
          source $BASH_ENV
        name: Generate dev version number
  generate-version-number-prod:
    steps:
    - run:
        command: |
          if git describe --tags --abbrev=0; then TAG=$(git describe --tags --abbrev=0); else exit 1; fi
          echo "VERSION_TAG=${TAG#v}" >> $BASH_ENV
          source $BASH_ENV
        name: Generate prod version number

jobs:
  build-ok:
    machine:
      image: ubuntu-2204:current
    steps:
      - run:
          name: Message
          command: |
            echo "OK"

  run-linter:
    docker:
      - image: cimg/python:3.13-node
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            python -m venv .venv
            . .venv/bin/activate
            pip install --no-cache-dir --upgrade pip
            pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt -r requirements-cloudrun.txt -r requirements-lambda.txt -r requirements-azure.txt
      - run:
          name: 'Run black / pyright'
          command: |
            . .venv/bin/activate
            black --check .
            pyright

  run-test-docker:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - docker/build:
          image: mcd/apollo-agent-tests
          extra_build_args: --target tests
          step-name: Run tests in docker build

  build-and-push:
    machine:
      image: ubuntu-2204:current
    parameters:
      docker_hub_repository:
        type: string
      code_version:
        type: string
    steps:
      - checkout
      - docker/check:
          use-docker-credentials-store: true
      # Attestations (SBOM + SLSA provenance) require the docker-container
      # buildx driver — the default docker driver writes single manifests, not
      # the OCI image index that holds attestation manifests alongside the
      # platform image. Set up once; reused by every buildx call below.
      - run:
          name: Set up buildx (docker-container driver)
          command: |
            docker buildx create --use --name apollo-builder --driver docker-container
            docker buildx inspect --bootstrap
      # Each target is built TWICE per the BuildKit-attestations workflow:
      #   1. --load into the local daemon so verify-version-in-docker-image
      #      can `docker run` against the image before anything is published.
      #   2. --push with --sbom=true --provenance=mode=max so the registry
      #      copy carries the supply-chain attestations Docker Scout reads.
      # BuildKit cache makes the second build cheap — only SBOM/provenance
      # generation is new work. --load and --push are mutually exclusive when
      # attestations are involved (the daemon can't load an OCI image index),
      # which is why two passes are necessary.
      #
      # Publish the `system-base` stage (apt-only, no venv, no apollo source) as
      # `<version>-system-base`. Downstream consumers (e.g. hermes-agent) build
      # their own venv on top against the same native libs without inheriting
      # apollo's pip-installed Python deps. No version check — system-base has
      # no apollo/agent/version file, so it goes straight to push.
      - run:
          name: Build and push system-base with SBOM + SLSA provenance
          command: |
            docker buildx build \
              --target system-base \
              --build-arg code_version=<< parameters.code_version >> \
              --build-arg build_number=<< pipeline.number >> \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:latest-system-base \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:<< parameters.code_version >>-system-base \
              --sbom=true \
              --provenance=mode=max \
              --push \
              .
      # AWS proxied/generic — same image, four tags (aws-proxied is the
      # current name, aws-generic is the legacy alias kept for back-compat).
      - run:
          name: Build aws_proxied image (local) for version verification
          command: |
            docker buildx build \
              --target aws_proxied \
              --build-arg code_version=<< parameters.code_version >> \
              --build-arg build_number=<< pipeline.number >> \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:latest-aws-proxied \
              --load \
              .
      - verify-version-in-docker-image:
          image: montecarlodata/<< parameters.docker_hub_repository >>:latest-aws-proxied
          version: << parameters.code_version >>,<< pipeline.number >>
      - run:
          name: Build and push aws_proxied with SBOM + SLSA provenance
          command: |
            docker buildx build \
              --target aws_proxied \
              --build-arg code_version=<< parameters.code_version >> \
              --build-arg build_number=<< pipeline.number >> \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:latest-aws-proxied \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:<< parameters.code_version >>-aws-proxied \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:latest-aws-generic \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:<< parameters.code_version >>-aws-generic \
              --sbom=true \
              --provenance=mode=max \
              --push \
              .
      # cloudrun
      - run:
          name: Build cloudrun image (local) for version verification
          command: |
            docker buildx build \
              --target cloudrun \
              --build-arg code_version=<< parameters.code_version >> \
              --build-arg build_number=<< pipeline.number >> \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:latest-cloudrun \
              --load \
              .
      - verify-version-in-docker-image:
          image: montecarlodata/<< parameters.docker_hub_repository >>:latest-cloudrun
          version: << parameters.code_version >>,<< pipeline.number >>
      - run:
          name: Build and push cloudrun with SBOM + SLSA provenance
          command: |
            docker buildx build \
              --target cloudrun \
              --build-arg code_version=<< parameters.code_version >> \
              --build-arg build_number=<< pipeline.number >> \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:latest-cloudrun \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:<< parameters.code_version >>-cloudrun \
              --sbom=true \
              --provenance=mode=max \
              --push \
              .
      # azure
      - run:
          name: Build azure image (local) for version verification
          command: |
            docker buildx build \
              --target azure \
              --build-arg code_version=<< parameters.code_version >> \
              --build-arg build_number=<< pipeline.number >> \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:latest-azure \
              --load \
              .
      - verify-version-in-docker-image:
          image: montecarlodata/<< parameters.docker_hub_repository >>:latest-azure
          version: << parameters.code_version >>,<< pipeline.number >>
      - run:
          name: Build and push azure with SBOM + SLSA provenance
          command: |
            docker buildx build \
              --target azure \
              --build-arg code_version=<< parameters.code_version >> \
              --build-arg build_number=<< pipeline.number >> \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:latest-azure \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:<< parameters.code_version >>-azure \
              --sbom=true \
              --provenance=mode=max \
              --push \
              .

  build-and-push-lambda:
    machine:
      image: ubuntu-2204:current
    parameters:
      docker_hub_repository:
        type: string
      aws_ecr_repository:
        type: string
      code_version:
        type: string
    steps:
      - checkout
      - docker/check:
          use-docker-credentials-store: true
      # Docker Hub copy: build and push with SBOM + SLSA provenance (mode=max)
      # attestations attached. The ECR step below uses the classic docker/build
      # orb, so we create the buildx builder WITHOUT --use and pass --builder
      # apollo-builder explicitly on this command. That leaves the default
      # builder in place so the classic `docker build` the orb runs for the
      # ECR step continues to use the daemon's docker driver and produces a
      # single-manifest image (which AWS Lambda / CloudFormation require).
      - run:
          name: Set up buildx (docker-container driver) for the Docker Hub build
          command: |
            docker buildx create --name apollo-builder --driver docker-container
            docker buildx inspect --builder apollo-builder --bootstrap
      - run:
          name: Build and push lambda (Docker Hub) with SBOM + SLSA provenance
          command: |
            docker buildx build \
              --builder apollo-builder \
              --target lambda \
              --build-arg code_version=<< parameters.code_version >> \
              --build-arg build_number=<< pipeline.number >> \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:latest-lambda \
              --tag montecarlodata/<< parameters.docker_hub_repository >>:<< parameters.code_version >>-lambda \
              --sbom=true \
              --provenance=mode=max \
              --push \
              .
      # ECR copy: rebuild with --provenance=false. AWS Lambda / CloudFormation
      # reject the OCI image index that BuildKit emits when attestations are
      # attached ("image manifest, config or layer media type ... is not
      # supported"), so the ECR image must be a plain single-arch manifest.
      # BuildKit cache means the second build is nearly free.
      - docker/build:
          step-name: Build lambda image (ECR, no attestations)
          use-buildkit: true
          extra_build_args: --target lambda --build-arg code_version=<< parameters.code_version >> --build-arg build_number=<< pipeline.number >> --provenance=false
          registry: ${AWS_ECR_ACCOUNT_URL}
          image: << parameters.aws_ecr_repository >>
          tag: latest,<< parameters.code_version >>
      - verify-version-in-docker-image:
          image: ${AWS_ECR_ACCOUNT_URL}/<< parameters.aws_ecr_repository >>:<< parameters.code_version >>
          version: << parameters.code_version >>,<< pipeline.number >>
      - aws-cli/setup:
          role_arn: "${AWS_ROLE_ARN}"
      - aws-ecr/ecr_login
      - aws-ecr/push_image:
          repo: << parameters.aws_ecr_repository >>
          tag: latest,<< parameters.code_version >>
  push-lambda-legacy-repo:
    machine:
      image: ubuntu-2204:current
    parameters:
      aws_ecr_repository:
        type: string
      code_version:
        type: string
    steps:
      - checkout
      # Build a fresh lambda image with --provenance=false for the legacy ECR.
      # Previously this job pulled the Docker Hub image and re-pushed, but
      # that image now ships as an OCI index with a provenance attestation
      # manifest that AWS Lambda / CloudFormation reject. Rebuilding here
      # keeps the ECR copy as a plain single-arch manifest.
      - docker/build:
          step-name: Build lambda image (legacy ECR, no attestations)
          use-buildkit: true
          extra_build_args: --target lambda --build-arg code_version=<< parameters.code_version >> --build-arg build_number=<< pipeline.number >> --provenance=false
          registry: ${AWS_ECR_ACCOUNT_URL}
          image: << parameters.aws_ecr_repository >>
          tag: latest,<< parameters.code_version >>
      - aws-ecr/ecr_login
      - aws-ecr/push_image:
          repo: << parameters.aws_ecr_repository >>
          tag: latest,<< parameters.code_version >>

  build-and-push-docs:
    docker:
      - image: python:3.13
    parameters:
      code_version:
        type: string
    steps:
      - checkout
      - aws-cli/install
      - aws-cli/setup:
          profile_name: default
      - run:
          name: Install dependencies
          command: |
            pip install virtualenv==20.35.4
            pip install --upgrade pip
      - run:
          name: Publish docs and invalidate the cloudfront cache
          command: make VERSION=<< parameters.code_version >> publish-docs

  update-and-validate-golden-agent:
    executor:
      name: aws-cli/default
      tag: current-22.04
    parameters:
      use_aws_cli:
        description: Use the AWS CLI to perform the update
        type: boolean
        default: false
      agent_uuid:
        description: UUID of the Agent
        type: string
      agent_version:
        description: The agent version installed, to check after the upgrade is complete
        type: string
      sleep_seconds:
        description: Seconds to wait after triggering the agent update and before checking for the new version
        type: string
        default: "0"
      image_repo:
        description: The image repository to use for the agent, pre-release-agent or agent
        type: string
        default: "agent"
      ecr_repo_name:
        description: The ECR repository to use for the AWS CLI update
        type: string
        default: "${AWS_AGENT_ECR_REPO_PROD}"
      ecr_repo_account:
        description: The AWS account to use for the ECR repo update
        type: string
        default: "${AWS_AGENT_ECR_ACCOUNT_PROD}"
    steps:
      - jq/install
      - run:
          name: Install dependencies
          command: |
            curl https://bootstrap.pypa.io/get-pip.py > get-pip.py
            python get-pip.py
            pip install --no-cache-dir --upgrade pip
            pip install --no-cache-dir montecarlodata
      - when:
          condition:
            equal: [ true, << parameters.use_aws_cli >> ]
          steps:
            - aws-cli/setup:
                role_arn: "${AWS_AGENT_ACCOUNT_ROLE_ARN}"
                profile_name: mcd
            - run:
                name: Trigger AWS agent stack update
                command: |
                  aws cloudformation update-stack --profile mcd --stack-name "${AWS_AGENT_STACK_NAME}" --use-previous-template --parameters "ParameterKey=ImageUri,ParameterValue=<< parameters.ecr_repo_account >>.dkr.ecr.*.amazonaws.com/<< parameters.ecr_repo_name >>:<< parameters.agent_version >>" --region ${AWS_AGENT_REGION} --capabilities CAPABILITY_IAM
            - run:
                name: Wait for update to complete
                command: |
                  aws cloudformation wait stack-update-complete --profile mcd --stack-name "${AWS_AGENT_STACK_NAME}" --region ${AWS_AGENT_REGION}
      - when:
          condition:
            not: << parameters.use_aws_cli >>
          steps:
            - run:
                name: Update agent
                command: |
                  export MCD_DEFAULT_API_ID=${MCD_SMOKE_TESTS_API_ID}
                  export MCD_DEFAULT_API_TOKEN=${MCD_SMOKE_TESTS_API_TOKEN}
                  export MCD_AGENT_IMAGE_REPO=<< parameters.image_repo >>
                  montecarlo agents upgrade --agent-id << parameters.agent_uuid >>
      - run:
          name: Run Agent Health - Validate version
          command: |
            sleep << parameters.sleep_seconds >>
            export MCD_DEFAULT_API_ID=${MCD_SMOKE_TESTS_API_ID}
            export MCD_DEFAULT_API_TOKEN=${MCD_SMOKE_TESTS_API_TOKEN}
            AGENT_VERSION=`montecarlo agents health --agent-id << parameters.agent_uuid >> | grep -v "Agent health check" | jq -r '.version'`
            echo "Agent Version: $AGENT_VERSION"
            if [ $AGENT_VERSION = "<< parameters.agent_version >>" ]
                then exit 0
                else echo "Failed to find expected version (<< parameters.agent_version >>), found: $AGENT_VERSION"; exit 1
            fi
      - run:
          name: Run validations
          command: |
            export MCD_DEFAULT_API_ID=${MCD_SMOKE_TESTS_API_ID}
            export MCD_DEFAULT_API_TOKEN=${MCD_SMOKE_TESTS_API_TOKEN}
            montecarlo collectors run-validations --all-validations --agent-id << parameters.agent_uuid >>

workflows:
  version: 2

  build-and-deploy:
    jobs:
      - run-linter
      - run-test-docker:
          # run for all tags and branches, we need to add this so the job is available for build-and-push-prod
          filters:
            tags:
              only: /.*/
      - build-and-push:
          name: build-and-push-dev
          docker_hub_repository: pre-release-agent
          code_version: ${NEXT_VERSION}
          pre-steps:
            - checkout
            - generate-version-number-dev
          context:
            - docker
          requires:
            - run-linter
            - run-test-docker
          filters:
            branches:
              only:
                - dev
                - /.*\/pr-.*/
      - update-and-validate-golden-agent:
          name: gcp-dev-update-and-validate-golden-agent
          agent_uuid: ${MCD_AGENT_UUID_WITH_GCP_AGENT}
          agent_version: ${NEXT_VERSION}
          image_repo: pre-release-agent
          pre-steps:
            - checkout
            - generate-version-number-dev
          context:
            - mc-dev
          requires:
            - build-and-push-dev
          filters:
            branches:
              only:
                - dev
      - update-and-validate-golden-agent:
          name: az-dev-update-and-validate-golden-agent
          agent_uuid: ${MCD_AGENT_UUID_WITH_AZ_AGENT}
          agent_version: ${NEXT_VERSION}
          sleep_seconds: "120"
          image_repo: pre-release-agent
          pre-steps:
            - checkout
            - generate-version-number-dev
          context:
            - mc-dev
          requires:
            - build-and-push-dev
          filters:
            branches:
              only:
                - dev
      - update-and-validate-golden-agent:
          name: gcp-prod-update-and-validate-golden-agent-merge-queue
          agent_uuid: ${MCD_AGENT_UUID_WITH_GCP_AGENT}
          agent_version: ${NEXT_VERSION}
          image_repo: pre-release-agent
          pre-steps:
            - checkout
            - generate-version-number-dev
          context:
            - mc-prod
          requires:
            - build-and-push-dev
          filters:
            branches:
              only:
                - /.*\/pr-.*/
      - update-and-validate-golden-agent:
          name: az-prod-update-and-validate-golden-agent-merge-queue
          agent_uuid: ${MCD_AGENT_UUID_WITH_AZ_AGENT}
          agent_version: ${NEXT_VERSION}
          sleep_seconds: "120"
          image_repo: pre-release-agent
          pre-steps:
            - checkout
            - generate-version-number-dev
          context:
            - mc-prod
          requires:
            - build-and-push-dev
          filters:
            branches:
              only:
                - /.*\/pr-.*/
      - build-and-push-lambda:
          name: build-and-push-lambda-dev
          docker_hub_repository: pre-release-agent
          aws_ecr_repository: mcd-pre-release-agent
          code_version: ${NEXT_VERSION}
          pre-steps:
            - checkout
            - generate-version-number-dev
          context:
            - aether-dev
            - docker
          requires:
            - run-linter
            - run-test-docker
          filters:
            branches:
              only:
                - dev
                - /.*\/pr-.*/
      - update-and-validate-golden-agent:
          name: aws-dev-update-and-validate-golden-agent
          agent_uuid: ${MCD_AGENT_UUID_WITH_AWS_AGENT}
          agent_version: ${NEXT_VERSION}
          image_repo: pre-release-agent
          pre-steps:
            - checkout
            - generate-version-number-dev
          context:
            - mc-dev
          requires:
            - build-and-push-lambda-dev
          filters:
            branches:
              only:
                - dev
      - update-and-validate-golden-agent:
          name: aws-prod-update-and-validate-golden-agent-merge-queue
          use_aws_cli: true
          agent_uuid: ${MCD_AGENT_UUID_WITH_AWS_AGENT}
          agent_version: ${NEXT_VERSION}
          ecr_repo_name: "${AWS_AGENT_ECR_REPO_DEV}"
          ecr_repo_account: "${AWS_AGENT_ECR_ACCOUNT_DEV}"
          pre-steps:
            - checkout
            - generate-version-number-dev
          context:
            - mc-prod
          requires:
            - build-and-push-lambda-dev
          filters:
            branches:
              only:
                - /.*\/pr-.*/
      - push-lambda-legacy-repo:
          name: push-lambda-aws-dev
          aws_ecr_repository: mcd-pre-release-agent
          code_version: ${NEXT_VERSION}
          pre-steps:
            - checkout
            - generate-version-number-dev
          context:
            - aws-dev
            - docker
          requires:
            - build-and-push-lambda-dev
          filters:
            branches:
              only:
                - dev
                - /.*\/pr-.*/
      - build-and-push:
          name: build-and-push-prod
          docker_hub_repository: agent
          code_version: ${VERSION_TAG}
          pre-steps:
            - checkout
            - generate-version-number-prod
          context:
            - docker
          requires:
            - run-linter
            - run-test-docker
          filters: # run only for tags starting with v, don't run for branches
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - update-and-validate-golden-agent:
          name: gcp-prod-update-and-validate-golden-agent
          agent_uuid: ${MCD_AGENT_UUID_WITH_GCP_AGENT}
          agent_version: ${VERSION_TAG}
          pre-steps:
            - checkout
            - generate-version-number-prod
          context:
            - mc-prod
          requires:
            - build-and-push-prod
      - update-and-validate-golden-agent:
          name: az-prod-update-and-validate-golden-agent
          agent_uuid: ${MCD_AGENT_UUID_WITH_AZ_AGENT}
          agent_version: ${VERSION_TAG}
          sleep_seconds: "120"
          pre-steps:
            - checkout
            - generate-version-number-prod
          context:
            - mc-prod
          requires:
            - build-and-push-prod
      - build-and-push-lambda:
          name: build-and-push-lambda-prod
          docker_hub_repository: agent
          aws_ecr_repository: mcd-agent
          code_version: ${VERSION_TAG}
          pre-steps:
            - checkout
            - generate-version-number-prod
          context:
            - aether-prod
            - docker
          requires:
            - run-linter
            - run-test-docker
          filters: # run only for tags starting with v, don't run for branches
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - update-and-validate-golden-agent:
          name: aws-prod-update-and-validate-golden-agent
          use_aws_cli: true
          agent_uuid: ${MCD_AGENT_UUID_WITH_AWS_AGENT}
          agent_version: ${VERSION_TAG}
          pre-steps:
            - checkout
            - generate-version-number-prod
          context:
            - mc-prod
          requires:
            - build-and-push-lambda-prod
      - push-lambda-legacy-repo:
          name: push-lambda-aws-prod
          aws_ecr_repository: mcd-agent
          code_version: ${VERSION_TAG}
          pre-steps:
            - checkout
            - generate-version-number-prod
          context:
            - aws-prod
            - docker
          requires:
            - build-and-push-lambda-prod
          filters: # run only for tags starting with v, don't run for branches
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - build-and-push-docs:
          name: build-and-push-docs-dev
          code_version: ${NEXT_VERSION}
          pre-steps:
            - checkout
            - generate-version-number-dev
          context:
            - aws-dev
          requires:
            - run-linter
            - run-test-docker
          filters:
            branches:
              only:
                - dev
      - build-and-push-docs:
          name: build-and-push-docs-prod
          code_version: ${VERSION_TAG}
          pre-steps:
            - checkout
            - generate-version-number-prod
          context:
            - aws-prod
          requires:
            - run-linter
            - run-test-docker
          filters: # run only for tags starting with v, don't run for branches
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - build-ok:
          requires:
            - run-linter
            - run-test-docker
            - gcp-prod-update-and-validate-golden-agent-merge-queue
            - az-prod-update-and-validate-golden-agent-merge-queue
            - aws-prod-update-and-validate-golden-agent-merge-queue
          filters:
            branches:
              ignore:
                - dev
                - main
